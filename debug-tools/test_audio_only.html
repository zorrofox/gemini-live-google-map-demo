<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频测试页面 - 仅语音对话</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Google Sans', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .container { text-align: center; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); max-width: 520px; width: 90%; }
        h1 { font-size: 2em; margin-bottom: 10px; font-weight: 600; }
        .subtitle { font-size: 0.9em; opacity: 0.8; margin-bottom: 20px; }
        .config-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .config-row label { font-size: 0.9em; align-self: center; }
        .config-row select { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.5); color: white; padding: 6px 12px; border-radius: 8px; font-size: 0.9em; }
        .config-row select option { color: #333; background: white; }
        .status { padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 1.1em; font-weight: 500; transition: all 0.3s ease; }
        .status.disconnected { background: rgba(255,59,48,0.3); }
        .status.connected { background: rgba(52,199,89,0.3); }
        .status.talking { background: rgba(255,204,0,0.3); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
        button { background: white; color: #667eea; border: none; padding: 15px 40px; font-size: 1.1em; font-weight: 600; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .logs { margin-top: 30px; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 10px; max-height: 220px; overflow-y: auto; text-align: left; font-family: 'Courier New', monospace; font-size: 0.85em; }
        .log-entry { margin: 5px 0; padding: 5px; border-left: 3px solid rgba(255,255,255,0.3); padding-left: 10px; }
        .info-box { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.15); border-radius: 10px; font-size: 0.9em; line-height: 1.6; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 音频测试页面</h1>
        <div class="subtitle">纯语音对话 — 用于验证麦克风输入与 AI 语音回复</div>

        <div class="config-row">
            <label>环境：</label>
            <select id="env-select">
                <option value="local">本地 (localhost:8000)</option>
                <option value="cloud">Cloud Run</option>
            </select>
            <label>语音：</label>
            <select id="voice-select">
                <option value="Aoede">Aoede（女声）</option>
                <option value="Charon">Charon</option>
                <option value="Fenrir">Fenrir</option>
                <option value="Puck">Puck</option>
                <option value="Kore">Kore</option>
                <option value="Marvin">Marvin</option>
            </select>
        </div>

        <div id="status" class="status disconnected">⚪ 未连接</div>
        <button id="connectBtn" onclick="connect()">开始连接</button>

        <div class="info-box">
            <strong>💡 使用说明：</strong><br>
            1. 选择目标环境和语音角色<br>
            2. 点击"开始连接"建立 WebSocket<br>
            3. 授予麦克风权限<br>
            4. 直接说话即可（VAD 自动检测）<br>
            5. AI 会以选定语音自动回复<br>
            6. 可同时打开 <code>test_websocket.html</code> 观察完整消息流
        </div>

        <div class="logs" id="logs">
            <div class="log-entry">等待连接...</div>
        </div>
    </div>

    <script>
        const URLS = {
            local: 'ws://localhost:8000/ws',
            cloud: 'wss://restaurant-guide-service-224077212497.us-central1.run.app/ws',
        };

        let ws = null;
        let audioContext = null;
        let mediaStream = null;
        let scriptProcessor = null;

        const statusDiv = document.getElementById('status');
        const logsDiv = document.getElementById('logs');
        const connectBtn = document.getElementById('connectBtn');

        function log(message) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString('zh-CN')}] ${message}`;
            logsDiv.appendChild(entry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
            console.log(message);
        }

        function updateStatus(text, className) {
            statusDiv.textContent = text;
            statusDiv.className = 'status ' + className;
        }

        async function connect() {
            const env = document.getElementById('env-select').value;
            const voice = document.getElementById('voice-select').value;
            const serviceUrl = `${URLS[env]}?client_type=glasses&voice_name=${voice}`;

            try {
                connectBtn.disabled = true;
                document.getElementById('env-select').disabled = true;
                document.getElementById('voice-select').disabled = true;
                log(`🔌 连接到: ${serviceUrl}`);
                updateStatus('🔄 连接中...', 'disconnected');

                ws = new WebSocket(serviceUrl);

                ws.onopen = async () => {
                    log('✅ WebSocket 连接成功');
                    updateStatus('🟢 已连接 — 准备中...', 'connected');

                    const setupMsg = {
                        setup: {
                            run_id: 'run_' + Date.now(),
                            user_id: 'audio_test_' + Date.now()
                        }
                    };
                    ws.send(JSON.stringify(setupMsg));
                    log('📤 已发送 setup 消息');
                };

                ws.onmessage = async (event) => {
                    try {
                        let data;
                        if (event.data instanceof Blob) {
                            data = JSON.parse(await event.data.text());
                        } else {
                            data = JSON.parse(event.data);
                        }

                        if (data.setupComplete !== undefined) {
                            log('✅ Setup 完成，可以开始说话了！');
                            updateStatus('🎤 准备就绪 — 请说话', 'connected');
                            await startAudio();
                            return;
                        }

                        // AI 音频回复
                        const parts = data.serverContent?.modelTurn?.parts || [];
                        for (const part of parts) {
                            if (part.inlineData?.data) {
                                log('🔊 收到 AI 音频回复，正在播放...');
                                updateStatus('🔊 AI 正在说话...', 'talking');
                                await playAudio(part.inlineData.data);
                                updateStatus('🎤 准备就绪 — 请说话', 'connected');
                            }
                        }

                        // 输出转录
                        if (data.serverContent?.outputTranscription?.text) {
                            log(`💬 AI: ${data.serverContent.outputTranscription.text}`);
                        }

                        // 工具调用
                        if (data.toolCall) {
                            const name = data.toolCall.functionCalls?.[0]?.name || '未知';
                            log(`🔧 工具调用: ${name}`);
                        }

                        // groundingResponse（餐厅数据广播）
                        if (data.name === 'grounding_tool_result' || data.groundingResponse) {
                            log('🗺️  收到餐厅 Grounding 数据');
                        }

                        // 状态消息
                        if (data.status) log(`ℹ️  ${data.status}`);

                    } catch (err) {
                        console.error('消息处理错误:', err);
                    }
                };

                ws.onerror = () => {
                    log('❌ WebSocket 错误');
                    updateStatus('❌ 连接错误', 'disconnected');
                    resetControls();
                };

                ws.onclose = () => {
                    log('🔌 连接已断开');
                    updateStatus('⚪ 未连接', 'disconnected');
                    stopAudio();
                    resetControls();
                };

            } catch (error) {
                log('❌ 连接失败: ' + error.message);
                updateStatus('❌ 连接失败', 'disconnected');
                resetControls();
            }
        }

        function resetControls() {
            connectBtn.disabled = false;
            document.getElementById('env-select').disabled = false;
            document.getElementById('voice-select').disabled = false;
        }

        async function startAudio() {
            try {
                log('🎙️  请求麦克风权限...');
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: { channelCount: 1, sampleRate: 16000, echoCancellation: true, noiseSuppression: true }
                });

                audioContext = new AudioContext({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(mediaStream);
                scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);

                scriptProcessor.onaudioprocess = (event) => {
                    const inputData = event.inputBuffer.getChannelData(0);
                    const pcm16 = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        const s = Math.max(-1, Math.min(1, inputData[i]));
                        pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({
                            realtimeInput: {
                                mediaChunks: [{ mimeType: 'audio/pcm', data: arrayBufferToBase64(pcm16.buffer) }]
                            }
                        }));
                    }
                };

                source.connect(scriptProcessor);
                scriptProcessor.connect(audioContext.destination);
                log('✅ 麦克风已启动，可以说话了！');

            } catch (error) {
                log('❌ 麦克风启动失败: ' + error.message);
            }
        }

        function stopAudio() {
            if (scriptProcessor) { scriptProcessor.disconnect(); scriptProcessor = null; }
            if (audioContext) { audioContext.close(); audioContext = null; }
            if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
        }

        async function playAudio(base64Audio) {
            try {
                const audioData = base64ToArrayBuffer(base64Audio);
                const audioCtx = new AudioContext({ sampleRate: 24000 });
                const audioBuffer = audioCtx.createBuffer(1, audioData.byteLength / 2, 24000);
                const channelData = audioBuffer.getChannelData(0);
                const view = new DataView(audioData);
                for (let i = 0; i < channelData.length; i++) {
                    channelData[i] = view.getInt16(i * 2, true) / 32768.0;
                }
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioCtx.destination);
                source.start();
                await new Promise(resolve => { source.onended = resolve; });
                audioCtx.close();
            } catch (error) {
                console.error('音频播放失败:', error);
            }
        }

        function arrayBufferToBase64(buffer) {
            let binary = '';
            const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }

        function base64ToArrayBuffer(base64) {
            const binaryString = atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            return bytes.buffer;
        }
    </script>
</body>
</html>

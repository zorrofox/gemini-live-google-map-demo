<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 测试 - 眼镜端模拟</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #00ff00; padding: 20px; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        .info-box { background: #2a2a2a; border: 2px solid #00ff00; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .info-box h3 { color: #ffff00; margin-bottom: 10px; }
        .url { color: #00ccff; word-break: break-all; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: 2px solid #00ff00; background: #2a2a2a; color: #00ff00; border-radius: 5px; transition: all 0.3s; }
        button:hover { background: #00ff00; color: #1a1a1a; box-shadow: 0 0 10px #00ff00; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { padding: 10px; margin-bottom: 10px; border-radius: 5px; font-weight: bold; }
        .status.connected { background: #004400; border: 2px solid #00ff00; }
        .status.disconnected { background: #440000; border: 2px solid #ff0000; color: #ff0000; }
        .status.connecting { background: #444400; border: 2px solid #ffff00; color: #ffff00; }
        .log-container { background: #0a0a0a; border: 2px solid #00ff00; border-radius: 8px; padding: 15px; height: 600px; overflow-y: auto; font-size: 14px; }
        .log-entry { margin-bottom: 10px; padding: 8px; border-left: 3px solid #00ff00; padding-left: 10px; }
        .log-entry.success { border-left-color: #00ff00; background: rgba(0,255,0,0.05); }
        .log-entry.error { border-left-color: #ff0000; background: rgba(255,0,0,0.05); color: #ff6666; }
        .log-entry.info { border-left-color: #00ccff; background: rgba(0,204,255,0.05); color: #00ccff; }
        .log-entry.data { border-left-color: #ffff00; background: rgba(255,255,0,0.05); color: #ffff00; }
        .timestamp { color: #888; font-size: 12px; }
        .message-type { color: #ff00ff; font-weight: bold; }
        pre { background: #000; padding: 10px; border-radius: 5px; overflow-x: auto; margin-top: 5px; color: #aaa; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { flex: 1; background: #2a2a2a; border: 2px solid #00ff00; border-radius: 5px; padding: 15px; text-align: center; }
        .stat-value { font-size: 32px; font-weight: bold; color: #00ff00; }
        .stat-label { color: #888; font-size: 14px; }
        .url-selector { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .url-selector label { color: #ffff00; }
        .url-selector select { background: #1a1a1a; border: 2px solid #00ff00; color: #00ff00; padding: 5px 10px; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 WebSocket 测试 - 眼镜端模拟</h1>

        <div class="info-box">
            <h3>📡 连接配置</h3>
            <div class="url-selector">
                <label>目标环境：</label>
                <select id="env-select" onchange="updateUrl()">
                    <option value="local">本地 (localhost:8000)</option>
                    <option value="cloud">Cloud Run</option>
                </select>
                <label>语音：</label>
                <select id="voice-select" onchange="updateUrl()">
                    <option value="Charon">Charon</option>
                    <option value="Aoede">Aoede</option>
                    <option value="Fenrir">Fenrir</option>
                    <option value="Puck">Puck</option>
                    <option value="Kore">Kore</option>
                    <option value="Marvin">Marvin</option>
                </select>
            </div>
            <p><strong>URL：</strong> <span class="url" id="ws-url"></span></p>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-value" id="message-count">0</div>
                <div class="stat-label">收到消息</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="server-content-count">0</div>
                <div class="stat-label">serverContent 消息</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="connection-time">--</div>
                <div class="stat-label">连接时长</div>
            </div>
        </div>

        <div id="status" class="status disconnected">⚫ 未连接</div>

        <div class="controls">
            <button id="connect-btn" onclick="connectWebSocket()">🔌 连接</button>
            <button id="disconnect-btn" onclick="disconnectWebSocket()" disabled>🔌 断开</button>
            <button onclick="clearLog()">🗑️ 清空日志</button>
        </div>

        <div class="info-box" style="margin-bottom: 20px;">
            <h3>💬 发送测试消息</h3>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <input type="text" id="message-input" placeholder="例如：帮我推荐迪拜购物中心附近的日本餐厅"
                       style="flex:1;padding:10px;background:#1a1a1a;border:2px solid #00ff00;color:#00ff00;border-radius:5px;font-size:14px;"
                       disabled />
                <button id="send-btn" onclick="sendMessage()" disabled style="padding:10px 30px;white-space:nowrap;">📤 发送</button>
            </div>
            <div style="margin-top:10px;display:flex;gap:5px;flex-wrap:wrap;">
                <button onclick="sendQuickMessage('帮我推荐迪拜购物中心附近的日本餐厅')" id="quick1" disabled style="padding:8px 15px;font-size:13px;">🍣 日本餐厅</button>
                <button onclick="sendQuickMessage('迪拜今天天气怎么样？')" id="quick2" disabled style="padding:8px 15px;font-size:13px;">🌤️ 查询天气</button>
                <button onclick="sendQuickMessage('推荐一家适合约会的高档餐厅')" id="quick3" disabled style="padding:8px 15px;font-size:13px;">🍽️ 约会餐厅</button>
            </div>
        </div>

        <div class="log-container" id="log-container">
            <div class="log-entry info">
                <div class="timestamp">[待连接]</div>
                <div>选择目标环境后点击"连接"按钮开始测试...</div>
            </div>
        </div>
    </div>

    <script>
        const URLS = {
            local: 'ws://localhost:8000/ws',
            cloud: 'wss://restaurant-guide-service-224077212497.us-central1.run.app/ws',
        };

        let ws = null;
        let messageCount = 0;
        let serverContentCount = 0;
        let connectTime = null;
        let timerInterval = null;

        const statusEl = document.getElementById('status');
        const connectBtn = document.getElementById('connect-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const logContainer = document.getElementById('log-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const quick1 = document.getElementById('quick1');
        const quick2 = document.getElementById('quick2');
        const quick3 = document.getElementById('quick3');

        function updateUrl() {
            const env = document.getElementById('env-select').value;
            const voice = document.getElementById('voice-select').value;
            const base = URLS[env];
            document.getElementById('ws-url').textContent = `${base}?client_type=glasses&voice_name=${voice}`;
        }

        function getWsUrl() {
            return document.getElementById('ws-url').textContent;
        }

        updateUrl(); // 初始化 URL 显示

        function log(message, type = 'info', data = null) {
            const timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3 });
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            let html = `<div class="timestamp">[${timestamp}]</div><div>${message}</div>`;
            if (data) {
                const jsonStr = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
                const truncated = jsonStr.length > 2000 ? jsonStr.substring(0, 2000) + '\n... (截断，总长度: ' + jsonStr.length + ' 字符)' : jsonStr;
                html += `<pre>${truncated}</pre>`;
            }
            entry.innerHTML = html;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function updateStatus(status, message) {
            statusEl.className = `status ${status}`;
            statusEl.textContent = message;
        }

        function updateStats() {
            document.getElementById('message-count').textContent = messageCount;
            document.getElementById('server-content-count').textContent = serverContentCount;
        }

        function updateTimer() {
            if (connectTime) {
                const seconds = Math.floor((Date.now() - connectTime) / 1000);
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                document.getElementById('connection-time').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }

        function setControlsEnabled(connected) {
            connectBtn.disabled = connected;
            disconnectBtn.disabled = !connected;
            messageInput.disabled = !connected;
            sendBtn.disabled = !connected;
            quick1.disabled = !connected;
            quick2.disabled = !connected;
            quick3.disabled = !connected;
            document.getElementById('env-select').disabled = connected;
            document.getElementById('voice-select').disabled = connected;
        }

        function connectWebSocket() {
            if (ws) { log('已连接，请先断开', 'error'); return; }

            const wsUrl = getWsUrl();
            log(`🔌 开始连接 WebSocket...`, 'info');
            log(`URL: ${wsUrl}`, 'info');
            updateStatus('connecting', '🟡 连接中...');
            connectBtn.disabled = true;

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    log('✅ WebSocket 连接成功！', 'success');
                    updateStatus('connected', '🟢 已连接');
                    setControlsEnabled(true);
                    connectTime = Date.now();
                    timerInterval = setInterval(updateTimer, 1000);

                    const setupMsg = {
                        setup: {
                            run_id: 'run_' + Date.now(),
                            user_id: 'test_user_' + Math.floor(Math.random() * 1000)
                        }
                    };
                    ws.send(JSON.stringify(setupMsg));
                    log('📤 发送 Setup 消息', 'info', setupMsg);
                };

                ws.onmessage = async (event) => {
                    messageCount++;
                    updateStats();

                    try {
                        let data;
                        if (event.data instanceof Blob) {
                            log(`📦 收到 Blob 消息 (${event.data.size} bytes)`, 'info');
                            data = JSON.parse(await event.data.text());
                        } else {
                            data = JSON.parse(event.data);
                        }

                        const msgType = Object.keys(data)[0];
                        log(`📨 消息 #${messageCount} - 类型: <span class="message-type">${msgType}</span>`, 'data');

                        if (msgType === 'setupComplete') {
                            log(`✅ Setup 完成`, 'success');
                        } else if (msgType === 'serverContent') {
                            serverContentCount++;
                            updateStats();
                            log(`🎯 收到 serverContent #${serverContentCount}`, 'success');
                            const content = data[msgType];
                            (content.modelTurn?.parts || []).forEach(part => {
                                if (part.text) log(`💬 文本: ${part.text}`, 'data');
                                if (part.inlineData) log(`🔊 音频: ${part.inlineData.data?.length || 0} bytes`, 'data');
                            });
                            if (content.outputTranscription?.text) log(`📝 转录: ${content.outputTranscription.text}`, 'data');
                            if (content.groundingMetadata) log(`🗺️  Grounding 数据（餐厅/地图）`, 'data', content.groundingMetadata);
                        } else if (msgType === 'toolCall') {
                            log(`🔧 工具调用`, 'data', data[msgType]);
                        } else if (msgType === 'toolCallCancellation') {
                            log(`❌ 工具调用取消`, 'data', data[msgType]);
                        } else {
                            log(`其他消息: ${msgType}`, 'info', data);
                        }
                    } catch (e) {
                        log(`⚠️  消息解析失败: ${e.message}`, 'error');
                    }
                };

                ws.onerror = () => log(`❌ WebSocket 错误`, 'error');

                ws.onclose = (event) => {
                    log(`🔌 连接关闭 - Code: ${event.code}, Reason: ${event.reason || '无'}`, 'info');
                    updateStatus('disconnected', '⚫ 未连接');
                    setControlsEnabled(false);
                    clearInterval(timerInterval);
                    connectTime = null;
                    ws = null;
                };

            } catch (error) {
                log(`❌ 连接失败: ${error.message}`, 'error');
                updateStatus('disconnected', '⚫ 未连接');
                connectBtn.disabled = false;
                ws = null;
            }
        }

        function disconnectWebSocket() {
            if (ws) { log('🔌 主动断开...', 'info'); ws.close(); }
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) { log('⚠️  请输入消息', 'error'); return; }
            sendTextToGemini(message);
            messageInput.value = '';
        }

        function sendQuickMessage(text) { sendTextToGemini(text); }

        function sendTextToGemini(text) {
            if (!ws || ws.readyState !== WebSocket.OPEN) { log('❌ 未连接', 'error'); return; }
            const message = {
                clientContent: {
                    turns: [{ role: "user", parts: [{ text }] }],
                    turnComplete: true
                }
            };
            ws.send(JSON.stringify(message));
            log(`📤 发送: "${text}"`, 'success');
            log('⏳ 等待 AI 回复（serverContent）...', 'info');
        }

        function clearLog() {
            logContainer.innerHTML = '<div class="log-entry info"><div class="timestamp">[已清空]</div><div>日志已清空</div></div>';
            messageCount = 0; serverContentCount = 0; updateStats();
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !messageInput.disabled) sendMessage();
        });

        window.addEventListener('beforeunload', () => { if (ws) ws.close(); });
    </script>
</body>
</html>

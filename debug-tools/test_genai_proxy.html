<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试 GenAI SDK Proxy 端点</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff00; }
        .config { background: #2a2a2a; border: 1px solid #00ff00; padding: 15px; border-radius: 5px; margin-bottom: 15px; }
        .config label { color: #ffff00; margin-right: 8px; }
        .config select { background: #1a1a1a; border: 1px solid #00ff00; color: #00ff00; padding: 5px 10px; border-radius: 3px; font-size: 14px; }
        button { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; border: 2px solid #00ff00; background: #2a2a2a; color: #00ff00; border-radius: 5px; }
        button:hover { background: #00ff00; color: #1a1a1a; }
        #log { white-space: pre-wrap; margin-top: 20px; border: 1px solid #00ff00; padding: 10px; max-height: 600px; overflow-y: auto; }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        .info { color: #ffff00; }
        p { color: #aaa; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>🧪 测试 GenAI SDK Proxy 端点</h1>
    <p>模拟 Go GenAI SDK 连接 <code>/ws/google.cloud.aiplatform.v1beta1.LlmBidiService/BidiGenerateContent</code></p>

    <div class="config">
        <label>目标环境：</label>
        <select id="env-select">
            <option value="local">本地 (localhost:8000)</option>
            <option value="cloud">Cloud Run</option>
        </select>
        <label style="margin-left:20px;">语音：</label>
        <select id="voice-select">
            <option value="Charon">Charon</option>
            <option value="Aoede">Aoede</option>
            <option value="Fenrir">Fenrir</option>
            <option value="Puck">Puck</option>
            <option value="Kore">Kore</option>
            <option value="Marvin">Marvin</option>
        </select>
    </div>

    <button onclick="testProxy()">🚀 开始测试</button>
    <button onclick="clearLog()">🗑️ 清空日志</button>

    <div id="log"></div>

    <script>
        const BASE_URLS = {
            local: 'ws://localhost:8000',
            cloud: 'wss://restaurant-guide-service-224077212497.us-central1.run.app',
        };

        const PROXY_PATH = '/ws/google.cloud.aiplatform.v1beta1.LlmBidiService/BidiGenerateContent';

        let ws = null;
        let messageCount = 0;
        let serverContentCount = 0;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString('zh-CN');
            logDiv.innerHTML += `<div class="${type}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            messageCount = 0;
            serverContentCount = 0;
        }

        async function testProxy() {
            if (ws) { ws.close(); ws = null; }
            clearLog();

            const env = document.getElementById('env-select').value;
            const voice = document.getElementById('voice-select').value;
            const url = BASE_URLS[env] + PROXY_PATH;

            log('======================================', 'info');
            log(`🧪 开始测试 GenAI SDK Proxy (${env})`, 'success');
            log(`语音: ${voice}`, 'info');
            log('======================================', 'info');
            log(`🔌 连接到: ${url}`, 'info');

            try {
                ws = new WebSocket(url);

                ws.onopen = () => {
                    log('✅ WebSocket 连接成功！', 'success');

                    // 模拟 Go GenAI SDK 发送的 setup 消息
                    const setupMsg = {
                        setup: {
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: {
                                    voiceConfig: {
                                        prebuiltVoiceConfig: { voiceName: voice }
                                    }
                                }
                            },
                            inputAudioTranscription: {},
                            outputAudioTranscription: {},
                        }
                    };
                    ws.send(JSON.stringify(setupMsg));
                    log('📤 发送 setup 消息（Go SDK 格式）', 'info');
                };

                ws.onmessage = async (event) => {
                    messageCount++;

                    let data;
                    if (event.data instanceof Blob) {
                        data = JSON.parse(await event.data.text());
                        log(`📦 收到 Blob 消息 (${event.data.size} bytes)`, 'info');
                    } else {
                        data = JSON.parse(event.data);
                        log(`📨 收到 String 消息`, 'info');
                    }

                    const msgType = Object.keys(data)[0];
                    log(`   类型: ${msgType}`, 'info');

                    if (msgType === 'setupComplete') {
                        log(`✅ Setup 完成！`, 'success');

                        // 发送迪拜餐厅推荐请求
                        setTimeout(() => {
                            const testMsg = {
                                clientContent: {
                                    turns: [{
                                        role: "user",
                                        parts: [{ text: "帮我推荐迪拜购物中心附近适合家庭聚餐的餐厅" }]
                                    }],
                                    turnComplete: true
                                }
                            };
                            ws.send(JSON.stringify(testMsg));
                            log('📤 发送测试消息: "帮我推荐迪拜购物中心附近适合家庭聚餐的餐厅"', 'success');
                            log('⏳ 等待 AI 回复...', 'info');
                        }, 500);
                    }
                    else if (msgType === 'serverContent') {
                        serverContentCount++;
                        const content = data[msgType];
                        log(`🎯 收到 serverContent #${serverContentCount}`, 'success');

                        (content.modelTurn?.parts || []).forEach(part => {
                            if (part.text) log(`💬 AI 文本: ${part.text.substring(0, 100)}`, 'success');
                            if (part.inlineData?.mimeType === 'audio/pcm') log(`🔊 音频: ${part.inlineData.data.length} 字符`, 'info');
                        });

                        if (content.outputTranscription?.text) log(`📝 转录: ${content.outputTranscription.text}`, 'success');
                        if (content.groundingMetadata) log(`🗺️  收到 Grounding 数据（餐厅/地图）`, 'success');

                        if (content.turnComplete) {
                            log('', 'info');
                            log('======================================', 'success');
                            log(`✅ 测试成功！AI 回复完成`, 'success');
                            log(`📊 共收到 ${messageCount} 条消息，${serverContentCount} 条 serverContent`, 'success');
                            log('======================================', 'success');
                        }
                    }
                    else if (msgType === 'toolCall') {
                        log(`🔧 工具调用: ${JSON.stringify(data[msgType]).substring(0, 100)}`, 'info');
                    }
                    else {
                        log(`   内容: ${JSON.stringify(data).substring(0, 100)}`, 'info');
                    }
                };

                ws.onerror = (error) => log(`❌ WebSocket 错误: ${error}`, 'error');

                ws.onclose = (event) => {
                    log(`🔌 连接关闭 - Code: ${event.code}, Reason: ${event.reason || '无'}`, 'info');
                    ws = null;
                };

            } catch (error) {
                log(`❌ 连接失败: ${error}`, 'error');
            }
        }
    </script>
</body>
</html>

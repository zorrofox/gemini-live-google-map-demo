<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket 测试 - 眼镜端模拟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }
        .info-box {
            background: #2a2a2a;
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .info-box h3 {
            color: #ffff00;
            margin-bottom: 10px;
        }
        .url {
            color: #00ccff;
            word-break: break-all;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: 2px solid #00ff00;
            background: #2a2a2a;
            color: #00ff00;
            border-radius: 5px;
            transition: all 0.3s;
        }
        button:hover {
            background: #00ff00;
            color: #1a1a1a;
            box-shadow: 0 0 10px #00ff00;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        .status.connected {
            background: #004400;
            border: 2px solid #00ff00;
        }
        .status.disconnected {
            background: #440000;
            border: 2px solid #ff0000;
            color: #ff0000;
        }
        .status.connecting {
            background: #444400;
            border: 2px solid #ffff00;
            color: #ffff00;
        }
        .log-container {
            background: #0a0a0a;
            border: 2px solid #00ff00;
            border-radius: 8px;
            padding: 15px;
            height: 600px;
            overflow-y: auto;
            font-size: 14px;
        }
        .log-entry {
            margin-bottom: 10px;
            padding: 8px;
            border-left: 3px solid #00ff00;
            padding-left: 10px;
        }
        .log-entry.success {
            border-left-color: #00ff00;
            background: rgba(0, 255, 0, 0.05);
        }
        .log-entry.error {
            border-left-color: #ff0000;
            background: rgba(255, 0, 0, 0.05);
            color: #ff6666;
        }
        .log-entry.info {
            border-left-color: #00ccff;
            background: rgba(0, 204, 255, 0.05);
            color: #00ccff;
        }
        .log-entry.data {
            border-left-color: #ffff00;
            background: rgba(255, 255, 0, 0.05);
            color: #ffff00;
        }
        .timestamp {
            color: #888;
            font-size: 12px;
        }
        .message-type {
            color: #ff00ff;
            font-weight: bold;
        }
        pre {
            background: #000;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            margin-top: 5px;
            color: #aaa;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-box {
            flex: 1;
            background: #2a2a2a;
            border: 2px solid #00ff00;
            border-radius: 5px;
            padding: 15px;
            text-align: center;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00ff00;
        }
        .stat-label {
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 WebSocket 测试 - 眼镜端模拟</h1>
        
        <div class="info-box">
            <h3>📡 连接信息</h3>
            <p><strong>URL:</strong> <span class="url" id="ws-url">wss://restaurant-guide-service-224077212497.us-central1.run.app/ws?client_type=glasses&voice_name=Charon</span></p>
            <p><strong>客户端类型:</strong> glasses</p>
            <p><strong>语音:</strong> Charon</p>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-value" id="message-count">0</div>
                <div class="stat-label">收到消息</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="server-content-count">0</div>
                <div class="stat-label">serverContent 消息</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="connection-time">--</div>
                <div class="stat-label">连接时长</div>
            </div>
        </div>

        <div id="status" class="status disconnected">
            ⚫ 未连接
        </div>

        <div class="controls">
            <button id="connect-btn" onclick="connectWebSocket()">🔌 连接</button>
            <button id="disconnect-btn" onclick="disconnectWebSocket()" disabled>🔌 断开</button>
            <button onclick="clearLog()">🗑️ 清空日志</button>
        </div>

        <div class="info-box" style="margin-bottom: 20px;">
            <h3>💬 发送测试消息</h3>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <input type="text" id="message-input" placeholder="输入消息，例如：帮我推荐曼谷的泰国餐厅" 
                       style="flex: 1; padding: 10px; background: #1a1a1a; border: 2px solid #00ff00; color: #00ff00; border-radius: 5px; font-size: 14px;" 
                       disabled />
                <button id="send-btn" onclick="sendMessage()" disabled 
                        style="padding: 10px 30px; white-space: nowrap;">📤 发送</button>
            </div>
            <div style="margin-top: 10px; display: flex; gap: 5px; flex-wrap: wrap;">
                <button onclick="sendQuickMessage('帮我推荐曼谷的泰国餐厅')" id="quick1" disabled 
                        style="padding: 8px 15px; font-size: 13px;">🍜 推荐泰国餐厅</button>
                <button onclick="sendQuickMessage('曼谷今天天气怎么样？')" id="quick2" disabled 
                        style="padding: 8px 15px; font-size: 13px;">🌤️ 查询天气</button>
                <button onclick="sendQuickMessage('给我介绍一下曼谷的景点')" id="quick3" disabled 
                        style="padding: 8px 15px; font-size: 13px;">🗺️ 介绍景点</button>
            </div>
        </div>

        <div class="log-container" id="log-container">
            <div class="log-entry info">
                <div class="timestamp">[待连接]</div>
                <div>点击"连接"按钮开始测试...</div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let messageCount = 0;
        let serverContentCount = 0;
        let connectTime = null;
        let timerInterval = null;

        const wsUrl = document.getElementById('ws-url').textContent;
        const statusEl = document.getElementById('status');
        const connectBtn = document.getElementById('connect-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const logContainer = document.getElementById('log-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const quick1 = document.getElementById('quick1');
        const quick2 = document.getElementById('quick2');
        const quick3 = document.getElementById('quick3');

        function log(message, type = 'info', data = null) {
            const timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3 });
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            
            let html = `<div class="timestamp">[${timestamp}]</div><div>${message}</div>`;
            if (data) {
                const jsonStr = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
                const truncated = jsonStr.length > 2000 ? jsonStr.substring(0, 2000) + '\n... (截断，总长度: ' + jsonStr.length + ' 字符)' : jsonStr;
                html += `<pre>${truncated}</pre>`;
            }
            entry.innerHTML = html;
            
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function updateStatus(status, message) {
            statusEl.className = `status ${status}`;
            statusEl.textContent = message;
        }

        function updateStats() {
            document.getElementById('message-count').textContent = messageCount;
            document.getElementById('server-content-count').textContent = serverContentCount;
        }

        function updateTimer() {
            if (connectTime) {
                const seconds = Math.floor((Date.now() - connectTime) / 1000);
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                document.getElementById('connection-time').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }

        function connectWebSocket() {
            if (ws) {
                log('WebSocket已连接，请先断开', 'error');
                return;
            }

            log('🔌 开始连接 WebSocket...', 'info');
            log(`URL: ${wsUrl}`, 'info');
            updateStatus('connecting', '🟡 连接中...');
            connectBtn.disabled = true;

            try {
                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    log('✅ WebSocket 连接成功！', 'success');
                    updateStatus('connected', '🟢 已连接');
                    connectBtn.disabled = true;
                    disconnectBtn.disabled = false;
                    messageInput.disabled = false;
                    sendBtn.disabled = false;
                    quick1.disabled = false;
                    quick2.disabled = false;
                    quick3.disabled = false;
                    connectTime = Date.now();
                    timerInterval = setInterval(updateTimer, 1000);

                    // 发送setup消息（只包含setup，不包含其他字段）
                    const userId = 'test_user_' + Math.floor(Math.random() * 1000);
                    const runId = 'run_' + Date.now();
                    const setupMsg = {
                        setup: {
                            run_id: runId,
                            user_id: userId
                        }
                    };
                    ws.send(JSON.stringify(setupMsg));
                    log('📤 发送 Setup 消息', 'info', setupMsg);
                };

                ws.onmessage = async (event) => {
                    messageCount++;
                    updateStats();

                    try {
                        let data;
                        
                        // 处理 Blob（二进制）消息 - 就像真实 Web 前端那样
                        if (event.data instanceof Blob) {
                            log(`📦 收到 Blob 消息 (${event.data.size} bytes)`, 'info');
                            const text = await event.data.text();
                            data = JSON.parse(text);
                        } 
                        // 处理 String（文本）消息
                        else if (typeof event.data === 'string') {
                            data = JSON.parse(event.data);
                        }
                        // 未知类型
                        else {
                            log(`⚠️  未知消息类型: ${typeof event.data}`, 'error');
                            return;
                        }
                        
                        const msgType = Object.keys(data)[0];
                        
                        log(`📨 消息 #${messageCount} - 类型: <span class="message-type">${msgType}</span>`, 'data');

                        if (msgType === 'setupComplete') {
                            log(`✅ Setup 完成 - Session ID: ${data[msgType].sessionId || 'N/A'}`, 'success');
                        } else if (msgType === 'serverContent') {
                            serverContentCount++;
                            updateStats();
                            log(`🎯 收到 serverContent（这是关键！）#${serverContentCount}`, 'success');
                            
                            const content = data[msgType];
                            if (content.modelTurn && content.modelTurn.parts) {
                                content.modelTurn.parts.forEach(part => {
                                    if (part.text) {
                                        log(`💬 文本内容: ${part.text}`, 'data');
                                    }
                                    if (part.inlineData) {
                                        log(`🔊 音频数据: ${part.inlineData.data ? part.inlineData.data.length : 0} bytes`, 'data');
                                    }
                                    if (part.executableCode) {
                                        log(`🔧 工具调用`, 'data', part.executableCode);
                                    }
                                });
                            }
                            
                            if (content.groundingMetadata) {
                                log(`🗺️  Grounding 信息（地图/餐厅）`, 'data', content.groundingMetadata);
                            }

                            log(`完整 JSON:`, 'info', data);
                        } else if (msgType === 'toolCall') {
                            log(`🔧 工具调用`, 'data', data[msgType]);
                        } else if (msgType === 'toolCallCancellation') {
                            log(`❌ 工具调用取消`, 'data', data[msgType]);
                        } else {
                            log(`其他消息类型: ${msgType}`, 'info', data);
                        }
                    } catch (e) {
                        log(`⚠️  非 JSON 消息: ${event.data.substring(0, 200)}`, 'error');
                    }
                };

                ws.onerror = (error) => {
                    log(`❌ WebSocket 错误: ${error.message || '未知错误'}`, 'error');
                };

                ws.onclose = (event) => {
                    log(`🔌 连接已关闭 - Code: ${event.code}, Reason: ${event.reason || '无'}`, 'info');
                    updateStatus('disconnected', '⚫ 未连接');
                    connectBtn.disabled = false;
                    disconnectBtn.disabled = true;
                    messageInput.disabled = true;
                    sendBtn.disabled = true;
                    quick1.disabled = true;
                    quick2.disabled = true;
                    quick3.disabled = true;
                    if (timerInterval) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                    }
                    connectTime = null;
                    ws = null;
                };

            } catch (error) {
                log(`❌ 连接失败: ${error.message}`, 'error');
                updateStatus('disconnected', '⚫ 未连接');
                connectBtn.disabled = false;
                ws = null;
            }
        }

        function disconnectWebSocket() {
            if (ws) {
                log('🔌 主动断开连接...', 'info');
                ws.close();
            }
        }

        function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) {
                log('⚠️  请输入消息内容', 'error');
                return;
            }
            sendTextToGemini(message);
            messageInput.value = '';
        }

        function sendQuickMessage(text) {
            sendTextToGemini(text);
        }

        function sendTextToGemini(text) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ WebSocket 未连接', 'error');
                return;
            }

            // 使用正确的驼峰命名：clientContent 和 turnComplete
            const message = {
                clientContent: {
                    turns: [
                        {
                            role: "user",
                            parts: [
                                {
                                    text: text
                                }
                            ]
                        }
                    ],
                    turnComplete: true
                }
            };

            try {
                const jsonStr = JSON.stringify(message);
                ws.send(jsonStr);
                log(`📤 发送文本消息: "${text}"`, 'success');
                log(`发送的JSON (请检查字段名):`, 'info', message);
                log('⏳ 等待 AI 回复（serverContent 消息）...', 'info');
            } catch (error) {
                log(`❌ 发送失败: ${error.message}`, 'error');
            }
        }

        function clearLog() {
            logContainer.innerHTML = '<div class="log-entry info"><div class="timestamp">[已清空]</div><div>日志已清空</div></div>';
            messageCount = 0;
            serverContentCount = 0;
            updateStats();
        }

        // 回车发送
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !messageInput.disabled) {
                sendMessage();
            }
        });

        // 页面关闭时断开连接
        window.addEventListener('beforeunload', () => {
            if (ws) {
                ws.close();
            }
        });
    </script>
</body>
</html>

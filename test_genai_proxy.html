<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试 GenAI SDK Proxy</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff00; }
        button { padding: 10px 20px; margin: 5px; font-size: 16px; }
        #log { white-space: pre-wrap; margin-top: 20px; border: 1px solid #00ff00; padding: 10px; max-height: 600px; overflow-y: auto; }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        .info { color: #ffff00; }
    </style>
</head>
<body>
    <h1>🧪 测试 GenAI SDK Proxy</h1>
    <p>模拟 Go GenAI SDK 的行为测试我们的服务</p>
    
    <button onclick="testProxy()">🚀 开始测试</button>
    <button onclick="clearLog()">🗑️ 清空日志</button>
    
    <div id="log"></div>

    <script>
        let ws = null;
        let messageCount = 0;
        let serverContentCount = 0;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type;
            logDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            messageCount = 0;
            serverContentCount = 0;
        }

        async function testProxy() {
            clearLog();
            log('======================================', 'info');
            log('🧪 开始测试 GenAI SDK Proxy', 'success');
            log('======================================', 'info');
            
            // 连接到 Gemini API 兼容端点
            const url = 'wss://restaurant-guide-service-224077212497.us-central1.run.app/ws/google.cloud.aiplatform.v1beta1.LlmBidiService/BidiGenerateContent';
            
            log(`🔌 连接到: ${url}`, 'info');
            
            try {
                ws = new WebSocket(url);
                
                ws.onopen = () => {
                    log('✅ WebSocket 连接成功！', 'success');
                    
                    // 1. 发送 setup 消息（模拟 GenAI SDK）
                    const setupMsg = {
                        setup: {
                            explicitVadSignal: true,
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: {
                                    voiceConfig: {
                                        prebuiltVoiceConfig: {
                                            voiceName: "Zephyr"
                                        }
                                    }
                                }
                            },
                            inputAudioTranscription: {},
                            model: "models/gemini-2.0-flash-exp"
                        }
                    };
                    
                    ws.send(JSON.stringify(setupMsg));
                    log('📤 发送 setup 消息', 'info');
                };
                
                ws.onmessage = async (event) => {
                    messageCount++;
                    
                    let data;
                    if (event.data instanceof Blob) {
                        const text = await event.data.text();
                        data = JSON.parse(text);
                        log(`📦 收到 Blob 消息 (${event.data.size} bytes)`, 'info');
                    } else {
                        data = JSON.parse(event.data);
                        log(`📨 收到 String 消息`, 'info');
                    }
                    
                    const msgType = Object.keys(data)[0];
                    log(`   类型: ${msgType}`, 'info');
                    
                    if (msgType === 'setupComplete') {
                        log(`✅ Setup 完成！Session ID: ${data[msgType].sessionId}`, 'success');
                        
                        // 2. Setup 完成后，发送测试消息
                        setTimeout(() => {
                            const testMsg = {
                                clientContent: {
                                    turns: [{
                                        role: "user",
                                        parts: [{ text: "你好，帮我推荐曼谷的泰国餐厅" }]
                                    }],
                                    turnComplete: true
                                }
                            };
                            
                            ws.send(JSON.stringify(testMsg));
                            log('📤 发送测试消息: "帮我推荐曼谷的泰国餐厅"', 'success');
                            log('⏳ 等待 AI 回复...', 'info');
                        }, 500);
                    }
                    else if (msgType === 'serverContent') {
                        serverContentCount++;
                        const content = data[msgType];
                        
                        log(`🎯 收到 serverContent #${serverContentCount}`, 'success');
                        
                        // 检查文本
                        if (content.modelTurn && content.modelTurn.parts) {
                            for (const part of content.modelTurn.parts) {
                                if (part.text) {
                                    log(`💬 AI 文本: ${part.text.substring(0, 100)}`, 'success');
                                }
                                if (part.inlineData && part.inlineData.mimeType === 'audio/pcm') {
                                    log(`🔊 音频数据: ${part.inlineData.data.length} 字符`, 'info');
                                }
                            }
                        }
                        
                        // 检查工具调用结果
                        if (content.groundingMetadata) {
                            log(`🗺️  收到 Grounding 数据（餐厅/地图）`, 'success');
                        }
                        
                        // 检查是否完成
                        if (content.turnComplete) {
                            log('', 'info');
                            log('======================================', 'success');
                            log(`✅ 测试成功！AI 回复完成！`, 'success');
                            log(`📊 统计: 收到 ${messageCount} 条消息，其中 ${serverContentCount} 条 serverContent`, 'success');
                            log('======================================', 'success');
                        }
                    }
                    else if (msgType === 'toolCall') {
                        log(`🔧 工具调用: ${JSON.stringify(data[msgType]).substring(0, 100)}`, 'info');
                    }
                };
                
                ws.onerror = (error) => {
                    log(`❌ WebSocket 错误: ${error}`, 'error');
                };
                
                ws.onclose = (event) => {
                    log(`🔌 连接关闭 - Code: ${event.code}, Reason: ${event.reason || '无'}`, 'info');
                };
                
            } catch (error) {
                log(`❌ 连接失败: ${error}`, 'error');
            }
        }
    </script>
</body>
</html>

steps:
  # Docker Build
  - name: 'gcr.io/cloud-builders/docker'
    args:
      ['build', '-t', '$_IMAGE_NAME', '-f', 'app-starter-pack/Dockerfile', '--build-arg', 'GOOGLE_API_KEY=$_GOOGLE_API_KEY', '.']

  # Docker Push
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE_NAME']

  # Deploy image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'react-next25-demo',
        '--image',
        '$_IMAGE_NAME',
        '--region',
        '$_REGION',
        '--memory',
        '4Gi',
        '--timeout',
        '1200',
        '--min',
        '1',
        '--set-env-vars',
        'GOOGLE_API_KEY=$_GOOGLE_API_KEY',
        '--set-env-vars',
        'FIRESTORE_PROJECT=$_FIRESTORE_PROJECT',
        '--set-env-vars',
        'PROJECT_NUMBER=$PROJECT_NUMBER',
      ]
images:
  - '$_IMAGE_NAME'
options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
